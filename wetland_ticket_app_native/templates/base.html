<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}广州海珠国家湿地公园票价查询{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script defer src="{{ url_for('static', filename='desktop.js') }}"></script>
</head>
<body>
    <div class="app-shell">
        <header class="window-titlebar">
            <div class="titlebar-drag pywebview-drag-region">
                <div class="app-mark">湿</div>
                <div class="title-group">
                    <div class="window-title">广州海珠国家湿地公园票价查询</div>
                    <div class="window-subtitle">桌面版票务辅助系统</div>
                </div>
            </div>
            <div class="titlebar-actions no-drag">
                <button type="button" class="window-btn" id="btnMinimize" title="最小化">—</button>
                <button type="button" class="window-btn" id="btnMaximize" title="最大化 / 还原">□</button>
                <button type="button" class="window-btn close" id="btnClose" title="关闭">×</button>
            </div>
        </header>
        <main class="page-area">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
