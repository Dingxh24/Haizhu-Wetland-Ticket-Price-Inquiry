{% extends 'base.html' %}
{% block title %}免票查询{% endblock %}
{% block content %}
<div class="container">
    <div class="hero-card">
        <div>
            <h1>迎使用票价查询系统</h1>
        </div>
        <div class="hero-badge">桌面版</div>
    </div>

    <h2>第一步：请选择是否符合免票条件</h2>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('submit_free') }}" id="freeForm">
        <div class="card">
            {% for key, label in free_options.items() %}
            <label class="option-item {% if key == 'none' %}none-option{% endif %}">
                <input type="checkbox" name="free_options" value="{{ key }}" class="free-checkbox">
                <span>{{ label }}</span>
            </label>
            {% endfor %}
        </div>

        <div class="button-row">
            <button type="submit" class="btn-primary">查询</button>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const checkboxes = document.querySelectorAll('.free-checkbox');
    const noneCheckbox = document.querySelector('input[value="none"]');
    checkboxes.forEach(box => {
        box.addEventListener('change', function () {
            if (this.value === 'none' && this.checked) {
                checkboxes.forEach(other => {
                    if (other.value !== 'none') {
                        other.checked = false;
                    }
                });
            }
            if (this.value !== 'none' && this.checked) {
                noneCheckbox.checked = false;
            }
        });
    });
});
</script>
{% endblock %}
