<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}广州海珠国家湿地公园票价查询{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script defer src="{{ url_for('static', filename='desktop.js') }}"></script>
</head>
<body>
    <div class="app-shell">
        <header class="window-titlebar">
            <div class="titlebar-drag pywebview-drag-region">
                <div class="app-mark">
                    {% if app_mark_icon_url %}
                    <img src="{{ app_mark_icon_url }}" alt="图标" class="app-mark-img">
                    {% else %}
                    湿
                    {% endif %}
                </div>
                <div class="title-group">
                    <div class="window-title">广州海珠国家湿地公园票价查询</div>
                    <div class="window-subtitle">桌面版票务辅助系统</div>
                </div>
            </div>
        </header>
        <main class="page-area">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
